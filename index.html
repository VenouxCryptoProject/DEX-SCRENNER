<!doctype html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>NEXUS Terminal — Dashboard Multi-Aset Global</title>
<meta name="description" content="NEXUS Terminal: dashboard crypto, forex, saham, komoditas & ekonomi dunia dalam satu layar. Tanpa login, tanpa registrasi.">
<meta name="theme-color" content="#07060d">
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app">
  <div id="overlay" class="overlay"></div>

  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="brand-mark">NX</div>
      <div class="brand-name">NEXUS <b>Terminal</b></div>
    </div>
    <nav class="nav-scroll" id="navScroll"></nav>
  </aside>

  <div class="main">
    <div class="topbar">
      <button class="hamburger" id="hamburger" aria-label="Menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="search-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input id="globalSearch" type="text" placeholder="Cari aset, saham, forex, komoditas...">
        <div id="searchResults" class="glass" style="display:none;position:absolute;top:calc(100% + 6px);left:0;right:0;border-radius:12px;overflow:hidden;z-index:70;max-height:340px;overflow-y:auto"></div>
      </div>
      <div class="topbar-right">
        <span class="clock" id="clock">--:--:--</span>
        <button class="pill-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg> Alerts</button>
        <a href="#/watchlist" class="pill-btn">★ Watchlist</a>
      </div>
    </div>

    <div class="ticker-bar">
      <div class="ticker-track" id="tickerTrack"></div>
    </div>

    <main id="app"></main>
  </div>
</div>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
</script>
</body>
</html>
